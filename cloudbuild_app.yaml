# cloudbuild_app.yaml
steps:
# 1. Build and tag
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - -t
    - us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:$SHORT_SHA
    - -t
    - us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:latest
    - -f
    - ./Dockerfile_app
    - .

# 2. Push both tags
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:$SHORT_SHA
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:latest

# 3. Deploy to Cloud Run
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: deploy
  entrypoint: gcloud
  args:
    - run
    - deploy
    - rag-service
    - --image
    - us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:$SHORT_SHA
    - --region
    - us-east1
    - --allow-unauthenticated
    - --service-account
    - cloud-run-backend@just-skyline-474622-e1.iam.gserviceaccount.com
    - --update-secrets
    - OPENAI_API_KEY=projects/just-skyline-474622-e1/secrets/OPENAI_API_KEY:latest,PINECONE_API_KEY=projects/just-skyline-474622-e1/secrets/PINECONE_API_KEY:latest,PINECONE_API_ENVIRONMENT=projects/just-skyline-474622-e1/secrets/PINECONE_API_ENVIRONMENT:latest,EMBEDDING_MODEL_NAME_OSS=projects/just-skyline-474622-e1/secrets/EMBEDDING_MODEL_NAME_OSS:latest,EMBEDDING_MODEL_NAME_OPENAI=projects/just-skyline-474622-e1/secrets/EMBEDDING_MODEL_NAME_OPENAI:latest,EMBEDDING_MODEL_NAME=projects/just-skyline-474622-e1/secrets/EMBEDDING_MODEL_NAME:latest,ENVIRONMENT=projects/just-skyline-474622-e1/secrets/ENVIRONMENT:latest,NUM_CHUNKS_RETRIEVED=projects/just-skyline-474622-e1/secrets/NUM_CHUNKS_RETRIEVED:latest,MIN_CHUNKS_FOR_RESPONSE=projects/just-skyline-474622-e1/secrets/MIN_CHUNKS_FOR_RESPONSE:latest,NUM_CHUNKS_SEARCHED_FOR_RERANKING=projects/just-skyline-474622-e1/secrets/NUM_CHUNKS_SEARCHED_FOR_RERANKING:latest,LLM_MODEL_NAME=projects/just-skyline-474622-e1/secrets/LLM_MODEL_NAME:latest,LLM_MODEL_NAME_OSS=projects/just-skyline-474622-e1/secrets/LLM_MODEL_NAME_OSS:latest,LLM_MODEL_NAME_OPENAI=projects/just-skyline-474622-e1/secrets/LLM_MODEL_NAME_OPENAI:latest,PINECONE_INDEX_NAME=projects/just-skyline-474622-e1/secrets/PINECONE_INDEX_NAME:latest,EMBED_PROVIDER=projects/just-skyline-474622-e1/secrets/EMBED_PROVIDER:latest,EMBED_MODEL=projects/just-skyline-474622-e1/secrets/EMBED_MODEL:latest,EMBED_DIM=projects/just-skyline-474622-e1/secrets/EMBED_DIM:latest,PINECONE_NAMESPACE=projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE:latest,YT_NAMESPACE_CONFIG=projects/just-skyline-474622-e1/secrets/YT_NAMESPACE_CONFIG:latest,PINECONE_NAMESPACE_VIDEOS=projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE_VIDEOS:latest,PINECONE_NAMESPACE_STREAMS=projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE_STREAMS:latest,PIPELINE_STORAGE_DIR=projects/just-skyline-474622-e1/secrets/PIPELINE_STORAGE_DIR:latest,VOICE_LIBRARY_DIR=projects/just-skyline-474622-e1/secrets/VOICE_LIBRARY_DIR:latest,SPEAKER_EMBED_CACHE_DIR=projects/just-skyline-474622-e1/secrets/SPEAKER_EMBED_CACHE_DIR:latest,VOICE_MATCH_THRESHOLD=projects/just-skyline-474622-e1/secrets/VOICE_MATCH_THRESHOLD:latest,SPEAKER_MAP_DIR=projects/just-skyline-474622-e1/secrets/SPEAKER_MAP_DIR:latest,VOICE_EMBED_BACKEND=projects/just-skyline-474622-e1/secrets/VOICE_EMBED_BACKEND:latest,VOICE_AUTO_ENROLL=projects/just-skyline-474622-e1/secrets/VOICE_AUTO_ENROLL:latest,VOICE_ENROLL_MIN_TALK_S=projects/just-skyline-474622-e1/secrets/VOICE_ENROLL_MIN_TALK_S:latest,VOICE_AUTO_ENROLL_NAME=projects/just-skyline-474622-e1/secrets/VOICE_AUTO_ENROLL_NAME:latest



# List an image so Cloud Build shows a link
images:
- us-east1-docker.pkg.dev/just-skyline-474622-e1/rag/rag:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
