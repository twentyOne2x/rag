    env: _EMBED_MODEL
  - versionName: projects/just-skyline-474622-e1/secrets/EMBED_DIM/versions/latest
    env: _EMBED_DIM
  - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE/versions/latest
    env: _PINECONE_NAMESPACE
  - versionName: projects/just-skyline-474622-e1/secrets/YT_NAMESPACE_CONFIG/versions/latest
    env: _YT_NAMESPACE_CONFIG
  - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE_VIDEOS/versions/latest
