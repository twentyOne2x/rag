    env: _LLM_MODEL_NAME_OPENAI
  - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_INDEX_NAME/versions/latest
    env: _PINECONE_INDEX_NAME
  - versionName: projects/just-skyline-474622-e1/secrets/EMBED_PROVIDER/versions/latest
