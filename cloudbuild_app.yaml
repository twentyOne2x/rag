# cloudbuild_app.yaml
steps:
# 1. Build and tag
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - -t
    - gcr.io/just-skyline-474622-e1/rag:$SHORT_SHA
    - -t
    - gcr.io/just-skyline-474622-e1/rag:latest
    - -f
    - ./Dockerfile_app
    - .

# 2. Push both tags
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - gcr.io/just-skyline-474622-e1/rag:$SHORT_SHA
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - gcr.io/just-skyline-474622-e1/rag:latest

# 3. SSH‑deploy on the VM, secrets injected via secretEnv
- name: gcr.io/cloud-builders/gcloud
  id: deploy
  entrypoint: bash
  secretEnv:
    - _OPENAI_API_KEY
    - _PINECONE_API_KEY
    - _PINECONE_API_ENVIRONMENT
    - _EMBEDDING_MODEL_NAME_OSS
    - _EMBEDDING_MODEL_NAME_OPENAI
    - _EMBEDDING_MODEL_NAME
    - _ENVIRONMENT
    - _NUM_CHUNKS_RETRIEVED
    - _MIN_CHUNKS_FOR_RESPONSE
    - _NUM_CHUNKS_SEARCHED_FOR_RERANKING
    - _LLM_MODEL_NAME
    - _LLM_MODEL_NAME_OSS
    - _LLM_MODEL_NAME_OPENAI
    - _PINECONE_INDEX_NAME
    - _EMBED_PROVIDER
    - _EMBED_MODEL
    - _EMBED_DIM
    - _PINECONE_NAMESPACE
    - _YT_NAMESPACE_CONFIG
    - _PINECONE_NAMESPACE_VIDEOS
    - _PINECONE_NAMESPACE_STREAMS
    - _PIPELINE_STORAGE_DIR
    - _VOICE_LIBRARY_DIR
    - _SPEAKER_EMBED_CACHE_DIR
    - _VOICE_MATCH_THRESHOLD
    - _SPEAKER_MAP_DIR
    - _VOICE_EMBED_BACKEND
    - _VOICE_AUTO_ENROLL
    - _VOICE_ENROLL_MIN_TALK_S
    - _VOICE_AUTO_ENROLL_NAME
  args:
    - -c
    - |
        gcloud compute ssh cloudbuild@${_VM_NAME} \
          --zone=${_VM_ZONE} \
          --project=just-skyline-474622-e1 -- \
          <<EOF
          sudo docker pull gcr.io/just-skyline-474622-e1/rag:${SHORT_SHA}
          
          # stop/remove old container if present
          if sudo docker ps -a --format '{{.Names}}' | grep -qw api; then
            sudo docker stop api && sudo docker rm api
          fi
          
          sudo docker run -d \
            --restart unless-stopped \
            --name api \
            -p 8080:8080 \
            --env-file /etc/mev-defaults.env \
            -e OPENAI_API_KEY=${_OPENAI_API_KEY} \
            -e PINECONE_API_KEY=${_PINECONE_API_KEY} \
            -e PINECONE_API_ENVIRONMENT=${_PINECONE_API_ENVIRONMENT} \
            -e EMBEDDING_MODEL_NAME_OSS=${_EMBEDDING_MODEL_NAME_OSS} \
            -e EMBEDDING_MODEL_NAME_OPENAI=${_EMBEDDING_MODEL_NAME_OPENAI} \
            -e EMBEDDING_MODEL_NAME=${_EMBEDDING_MODEL_NAME} \
            -e ENVIRONMENT=${_ENVIRONMENT} \
            -e NUM_CHUNKS_RETRIEVED=${_NUM_CHUNKS_RETRIEVED} \
            -e MIN_CHUNKS_FOR_RESPONSE=${_MIN_CHUNKS_FOR_RESPONSE} \
            -e NUM_CHUNKS_SEARCHED_FOR_RERANKING=${_NUM_CHUNKS_SEARCHED_FOR_RERANKING} \
            -e LLM_MODEL_NAME=${_LLM_MODEL_NAME} \
            -e LLM_MODEL_NAME_OSS=${_LLM_MODEL_NAME_OSS} \
            -e LLM_MODEL_NAME_OPENAI=${_LLM_MODEL_NAME_OPENAI} \
            -e PINECONE_INDEX_NAME=${_PINECONE_INDEX_NAME} \
            -e EMBED_PROVIDER=${_EMBED_PROVIDER} \
            -e EMBED_MODEL=${_EMBED_MODEL} \
            -e EMBED_DIM=${_EMBED_DIM} \
            -e PINECONE_NAMESPACE=${_PINECONE_NAMESPACE} \
            -e YT_NAMESPACE_CONFIG=${_YT_NAMESPACE_CONFIG} \
            -e PINECONE_NAMESPACE_VIDEOS=${_PINECONE_NAMESPACE_VIDEOS} \
            -e PINECONE_NAMESPACE_STREAMS=${_PINECONE_NAMESPACE_STREAMS} \
            -e PIPELINE_STORAGE_DIR=${_PIPELINE_STORAGE_DIR} \
            -e VOICE_LIBRARY_DIR=${_VOICE_LIBRARY_DIR} \
            -e SPEAKER_EMBED_CACHE_DIR=${_SPEAKER_EMBED_CACHE_DIR} \
            -e VOICE_MATCH_THRESHOLD=${_VOICE_MATCH_THRESHOLD} \
            -e SPEAKER_MAP_DIR=${_SPEAKER_MAP_DIR} \
            -e VOICE_EMBED_BACKEND=${_VOICE_EMBED_BACKEND} \
            -e VOICE_AUTO_ENROLL=${_VOICE_AUTO_ENROLL} \
            -e VOICE_ENROLL_MIN_TALK_S=${_VOICE_ENROLL_MIN_TALK_S} \
            -e VOICE_AUTO_ENROLL_NAME=${_VOICE_AUTO_ENROLL_NAME} \
            gcr.io/just-skyline-474622-e1/rag:${SHORT_SHA}
          EOF



# List an image so Cloud Build shows a link
images:
- gcr.io/just-skyline-474622-e1/rag:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

# Define user substitutions
substitutions:
  _VM_NAME: rag-build-vm
  _VM_ZONE: us-east1-b

# Secrets made available to secretEnv above
availableSecrets:
  secretManager:
  - versionName: projects/just-skyline-474622-e1/secrets/OPENAI_API_KEY/versions/latest
    env: _OPENAI_API_KEY
  - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_API_ENVIRONMENT/versions/latest
    env: _PINECONE_API_ENVIRONMENT
