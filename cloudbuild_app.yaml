# cloudbuild_app.yaml
steps:
# 1. Build and tag
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - -t
    - gcr.io/mev-fyi/llama-flask-app:$SHORT_SHA
    - -t
    - gcr.io/mev-fyi/llama-flask-app:latest
    - -f
    - ./Dockerfile_app
    - .

# 2. Push both tags
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - gcr.io/mev-fyi/llama-flask-app:$SHORT_SHA
- name: gcr.io/cloud-builders/docker
  args:
    - push
    - gcr.io/mev-fyi/llama-flask-app:latest

# New debugging step to verify secrets are loaded
- name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
  id: "verify-secrets"
  entrypoint: "bash"
  args:
    - "-c"
    - |
      echo "Verifying secrets are available:"
      echo "NUMBER_OF_APP_WORKERS length: ${#_NUMBER_OF_APP_WORKERS}"
  secretEnv:
    - _NUMBER_OF_APP_WORKERS
    - _ASSEMBLY_AI_API_KEY
    - _OPENAI_API_KEY

# 3. SSH‑deploy on the VM, secrets injected via secretEnv
- name: gcr.io/cloud-builders/gcloud
  id: deploy
  entrypoint: bash
  secretEnv:
    - _ASSEMBLY_AI_API_KEY
    - _OPENAI_API_BASE_ANYSCALE
    - _OPENAI_API_KEY
    - _OPENAI_API_KEY_ANYSCALE
    - _PINECONE_API_ENVIRONMENT
    - _PINECONE_API_KEY
    - _YOUTUBE_API_KEY
    - _YOUTUBE_CHANNELS
    - _GOOGLE_CLOUD_PROJECT
    - _ASSEMBLY_AI_API
    - _NUMBER_OF_APP_WORKERS
  args:
    - -c
    - |
        gcloud compute ssh cloudbuild@${_VM_NAME} \
          --zone=${_VM_ZONE} \
          --project=mev-fyi -- \
          <<EOF
          sudo docker pull gcr.io/mev-fyi/llama-flask-app:${SHORT_SHA}
          
          # stop/remove old container if present
          if sudo docker ps -a --format '{{.Names}}' | grep -qw api; then
            sudo docker stop api && sudo docker rm api
          fi
          
          sudo docker run -d \
            --restart unless-stopped \
            --name api \
            -p 8080:8080 \
            --env-file /etc/mev-defaults.env \
            -e REACT_APP_BACKEND_URL=https://api.mev.fyi \
            -e NUMBER_OF_APP_WORKERS=${_NUMBER_OF_APP_WORKERS} \
            -e ASSEMBLY_AI_API_KEY=${_ASSEMBLY_AI_API_KEY} \
            -e OPENAI_API_BASE_ANYSCALE=${_OPENAI_API_BASE_ANYSCALE} \
            -e OPENAI_API_KEY=${_OPENAI_API_KEY} \
            -e OPENAI_API_KEY_ANYSCALE=${_OPENAI_API_KEY_ANYSCALE} \
            -e PINECONE_API_ENVIRONMENT=${_PINECONE_API_ENVIRONMENT} \
            -e PINECONE_API_KEY=${_PINECONE_API_KEY} \
            -e YOUTUBE_API_KEY=${_YOUTUBE_API_KEY} \
            -e YOUTUBE_CHANNELS=${_YOUTUBE_CHANNELS} \
            -e GOOGLE_CLOUD_PROJECT=${_GOOGLE_CLOUD_PROJECT} \
            -e ASSEMBLY_AI_API=${_ASSEMBLY_AI_API} \
            gcr.io/mev-fyi/llama-flask-app:${SHORT_SHA}
          EOF



# List an image so Cloud Build shows a link
images:
- gcr.io/mev-fyi/llama-flask-app:$SHORT_SHA

# Define user substitutions
substitutions:
  _VM_NAME: mev-api-vm
  _VM_ZONE: europe-west1-d

# Secrets made available to secretEnv above
availableSecrets:
  secretManager:
  - versionName: projects/mev-fyi/secrets/ASSEMBLY_AI_API_KEY/versions/latest
    env: _ASSEMBLY_AI_API_KEY
  - versionName: projects/mev-fyi/secrets/OPENAI_API_BASE_ANYSCALE/versions/latest
    env: _OPENAI_API_BASE_ANYSCALE
  - versionName: projects/mev-fyi/secrets/OPENAI_API_KEY/versions/latest
    env: _OPENAI_API_KEY
  - versionName: projects/mev-fyi/secrets/OPENAI_API_KEY_ANYSCALE/versions/latest
    env: _OPENAI_API_KEY_ANYSCALE
  - versionName: projects/mev-fyi/secrets/PINECONE_API_ENVIRONMENT/versions/latest
    env: _PINECONE_API_ENVIRONMENT
  - versionName: projects/mev-fyi/secrets/PINECONE_API_KEY/versions/latest
    env: _PINECONE_API_KEY
  - versionName: projects/mev-fyi/secrets/YOUTUBE_API_KEY/versions/latest
    env: _YOUTUBE_API_KEY
  - versionName: projects/mev-fyi/secrets/YOUTUBE_CHANNELS/versions/latest
    env: _YOUTUBE_CHANNELS
  - versionName: projects/mev-fyi/secrets/GOOGLE_CLOUD_PROJECT/versions/latest
    env: _GOOGLE_CLOUD_PROJECT
  - versionName: projects/mev-fyi/secrets/ASSEMBLY_AI_API/versions/latest
    env: _ASSEMBLY_AI_API
  - versionName: projects/mev-fyi/secrets/NUMBER_OF_APP_WORKERS/versions/latest
    env: _NUMBER_OF_APP_WORKERS