    - versionName: projects/just-skyline-474622-e1/secrets/EMBED_DIM/versions/latest
      env: 'EMBED_DIM'
    - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE/versions/latest
      env: 'PINECONE_NAMESPACE'
    - versionName: projects/just-skyline-474622-e1/secrets/YT_NAMESPACE_CONFIG/versions/latest
      env: 'YT_NAMESPACE_CONFIG'
    - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE_VIDEOS/versions/latest
      env: 'PINECONE_NAMESPACE_VIDEOS'
    - versionName: projects/just-skyline-474622-e1/secrets/PINECONE_NAMESPACE_STREAMS/versions/latest
      env: 'PINECONE_NAMESPACE_STREAMS'
    - versionName: projects/just-skyline-474622-e1/secrets/PIPELINE_STORAGE_DIR/versions/latest
      env: 'PIPELINE_STORAGE_DIR'
    - versionName: projects/just-skyline-474622-e1/secrets/VOICE_LIBRARY_DIR/versions/latest
      env: 'VOICE_LIBRARY_DIR'
    - versionName: projects/just-skyline-474622-e1/secrets/SPEAKER_EMBED_CACHE_DIR/versions/latest
      env: 'SPEAKER_EMBED_CACHE_DIR'
    - versionName: projects/just-skyline-474622-e1/secrets/VOICE_MATCH_THRESHOLD/versions/latest
      env: 'VOICE_MATCH_THRESHOLD'
    - versionName: projects/just-skyline-474622-e1/secrets/SPEAKER_MAP_DIR/versions/latest
      env: 'SPEAKER_MAP_DIR'
    - versionName: projects/just-skyline-474622-e1/secrets/VOICE_EMBED_BACKEND/versions/latest
      env: 'VOICE_EMBED_BACKEND'
