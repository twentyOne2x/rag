      env: 'ENVIRONMENT'
    - versionName: projects/just-skyline-474622-e1/secrets/NUM_CHUNKS_RETRIEVED/versions/latest
      env: 'NUM_CHUNKS_RETRIEVED'
    - versionName: projects/just-skyline-474622-e1/secrets/MIN_CHUNKS_FOR_RESPONSE/versions/latest
