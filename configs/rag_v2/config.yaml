environment: local
models:
  embedding_primary: text-embedding-3-large
  embedding_openai: text-embedding-3-large
  embedding_oss: thenlper/gte-large
  embed_provider: openai
  embed_dim: 3072
  llm_primary: gpt-4o-mini
  llm_openai: gpt-3.5-turbo
  llm_oss: meta-llama/Llama-2-7b-chat-hf
retrieval:
  num_chunks_retrieved: 15
  min_chunks_for_response: 5
  num_chunks_searched_for_reranking: 70
  debug: false
modes:
  default: quick
  quick:
    label: Quick Research
    description: Low-latency baseline retrieval for everyday prompts.
    prompt:
      quote_min_count: 4
    retrieval:
      stage1_topn: 80
      topk_post_rerank: 20
      ce_min_keep: 10
      max_final_nodes: 12
  deep:
    label: Deep Research
    description: Wider recall pass with larger synthesis budget and denser citations.
    aliases:
      - thorough
      - verbose
    prompt:
      quote_min_count: 6
    retrieval:
      stage1_topn: 260
      topk_post_rerank: 60
      ce_min_keep: 28
      ce_keep_percentile: 0.9
      ce_abs_min: 0.28
      max_final_nodes: 18
      max_segments_per_parent: 10
pinecone:
  index_name: icmfyi-v2
  namespace: videos
  streams_namespace: streams
youtube:
  namespace_config: videos
paths:
  pipeline_storage: ./pipeline_storage
  voice_library: ./voice_library
  speaker_embed_cache: ./speaker_cache
  speaker_map: ./speaker_map
voice:
  match_threshold: 0.75
  embed_backend: default
  auto_enroll: false
  auto_enroll_name: auto
  enroll_min_talk_s: 3
