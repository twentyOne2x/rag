name: Knowledge Base Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  knowledge-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate required docs
        run: python3 scripts/knowledge_check.py
